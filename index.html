const REPORTS = [{"id": "daily_2026-06-12", "date": "2026-06-12", "type": "daily"}, {"id": "weekly_2026-06-12", "date": "2026-06-12", "type": "weekly"}, {"id": "daily_2026-06-11", "date": "2026-06-11", "type": "daily"}, {"id": "daily_2026-06-10", "date": "2026-06-10", "type": "daily"}, {"id": "daily_2026-06-09", "date": "2026-06-09", "type": "daily"}, {"id": "daily_2026-06-08", "date": "2026-06-08", "type": "daily"}, {"id": "daily_2026-06-07", "date": "2026-06-07", "type": "daily"}, {"id": "daily_2026-06-06", "date": "2026-06-06", "type": "daily"}, {"id": "daily_2026-06-05", "date": "2026-06-05", "type": "daily"}, {"id": "daily_2026-06-04", "date": "2026-06-04", "type": "daily"}, {"id": "daily_2026-06-03", "date": "2026-06-03", "type": "daily"}, {"id": "daily_2026-06-02", "date": "2026-06-02", "type": "daily"}, {"id": "daily_2026-06-01", "date": "2026-06-01", "type": "daily"}, {"id": "daily_2026-05-31", "date": "2026-05-31", "type": "daily"}, {"id": "daily_2026-05-30", "date": "2026-05-30", "type": "daily"}, {"id": "daily_2026-05-29", "date": "2026-05-29", "type": "daily"}, {"id": "weekly_2026-05-29", "date": "2026-05-29", "type": "weekly"}, {"id": "daily_2026-05-28", "date": "2026-05-28", "type": "daily"}];
let currentId = REPORTS.length ? REPORTS[0].id : null;
let filteredList = REPORTS;

function renderNav(list) {
  const el = document.getElementById('nav-list');
  if (!list.length) {
    el.innerHTML = '<div class="no-results">没有匹配的报告</div>';
    return;
  }
  const groups = {};
  list.forEach(r => {
    const m = r.date.slice(0, 7);
    (groups[m] = groups[m] || []).push(r);
  });
  let html = '';
  Object.keys(groups).sort().reverse().forEach(month => {
    html += `<div class="group-label">${month}</div>`;
    groups[month].forEach(r => {
      const isW = r.type === 'weekly';
      html += `<div class="nav-item${r.id === currentId ? ' active' : ''}" onclick="showReport('${r.id}')">
        <div class="nav-icon ${isW ? 'icon-w' : 'icon-d'}">${isW ? '📊' : '📋'}</div>
        <div class="nav-info">
          <div class="nav-date">${r.date}</div>
          <div class="nav-type">${isW ? '周报' : '日报'}</div>
        </div>
        <div class="nav-dot"></div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function showReport(id) {
  // 隐藏当前
  if (currentId) {
    const prev = document.getElementById('panel-' + currentId);
    if (prev) prev.style.display = 'none';
  }
  currentId = id;
  // 显示新的
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.style.display = 'block';
  // 滚回顶部
  document.getElementById('main').scrollTop = 0;
  // 更新导航高亮
  renderNav(filteredList);
}

function filterNav(q) {
  q = q.toLowerCase().trim();
  filteredList = q ? REPORTS.filter(r =>
    r.date.includes(q) ||
    (q === '日报' && r.type === 'daily') ||
    (q === '周报' && r.type === 'weekly')
  ) : REPORTS;
  renderNav(filteredList);
  if (filteredList.length && !filteredList.find(r => r.id === currentId)) {
    showReport(filteredList[0].id);
  }
}

// 初始化
renderNav(REPORTS);
</script>
</body>
</html>
